services:
  backend:
    build: ./backend
    container_name: exadata-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - exadata-net

  frontend:
    build: ./frontend
    container_name: exadata-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - exadata-net

  redis:
    image: redis:7-alpine
    container_name: exadata-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - exadata-net

networks:
  exadata-net:
    driver: bridge
